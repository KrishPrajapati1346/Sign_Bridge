name: Keep-Alive Cron

on:
  schedule:
    # Run every 10 minutes to prevent Render free-tier sleep
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: curl -sSf ${{ secrets.RENDER_API_URL }}/api/health > /dev/null || exit 1
