name: Keep-Alive Cron

on:
  schedule:
    # Run every 10 minutes to prevent Render free-tier sleep
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: curl -sSf --retry 3 --retry-delay 10 --retry-connrefused https://sign-bridge-o70r.onrender.com/api/health > /dev/null || exit 1
